name: Build Windows EXE

on:
  push:
    branches:
      - gui-main
    tags:
      - gui-v*
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build executable
        shell: pwsh
        run: |
          pyinstaller --noconfirm --clean --windowed --onefile `
            --name "XUnity.AutoTranslator-SakuraLLM GUI" `
            --add-data "data;data" `
            --exclude-module tkinter `
            --exclude-module unittest `
            --exclude-module pydoc `
            --exclude-module pydoc_data `
            --exclude-module inspect `
            --exclude-module email `
            --exclude-module http `
            --exclude-module test `
            app.py

      - name: Create zip package
        shell: pwsh
        run: |
          Compress-Archive -Path "app.py", "gui", "sakura_llm", "data", "requirements.txt", "README.md" -DestinationPath "dist/XUnity.AutoTranslator-SakuraLLM GUI-windows.zip" -Force

      - name: Upload exe artifact
        uses: actions/upload-artifact@v4
        with:
          name: XUnity.AutoTranslator-SakuraLLM-GUI-exe
          path: dist/XUnity.AutoTranslator-SakuraLLM GUI.exe

      - name: Upload zip artifact
        uses: actions/upload-artifact@v4
        with:
          name: XUnity.AutoTranslator-SakuraLLM-GUI-zip
          path: dist/XUnity.AutoTranslator-SakuraLLM GUI-windows.zip

      - name: Publish release assets
        if: startsWith(github.ref, 'refs/tags/gui-v')
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/XUnity.AutoTranslator-SakuraLLM GUI.exe
            dist/XUnity.AutoTranslator-SakuraLLM GUI-windows.zip
