name: Build Windows EXE

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build executable
        shell: pwsh
        run: |
          pyinstaller --noconfirm --clean --windowed --onefile --name "XUnity.AutoTranslator-SakuraLLM GUI" --add-data "data;data" app.py

      - name: Create zip package
        shell: pwsh
        run: |
          Compress-Archive -Path "dist/XUnity.AutoTranslator-SakuraLLM GUI.exe" -DestinationPath "dist/XUnity.AutoTranslator-SakuraLLM GUI-windows.zip" -Force

      - name: Upload exe artifact
        uses: actions/upload-artifact@v4
        with:
          name: XUnity.AutoTranslator-SakuraLLM-GUI-exe
          path: dist/XUnity.AutoTranslator-SakuraLLM GUI.exe

      - name: Upload zip artifact
        uses: actions/upload-artifact@v4
        with:
          name: XUnity.AutoTranslator-SakuraLLM-GUI-zip
          path: dist/XUnity.AutoTranslator-SakuraLLM GUI-windows.zip
